<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Autoescuela Matías — Test</title>

  <style>
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fbcfe8, #f9a8d4, #f472b6);
      color: #4a044e;
    }

    .card {
      width: 95%;
      max-width: 900px;
      background: rgba(255, 240, 245, 0.75);
      border-radius: 24px;
      padding: 24px 28px;
      backdrop-filter: blur(18px);
      border: 1px solid rgba(244, 114, 182, 0.4);
      box-shadow: 0 20px 60px rgba(244, 114, 182, 0.4);
    }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #9d174d;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #be185d;
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #fce7f3;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ec4899, #db2777);
      transition: width 0.3s ease;
    }

    .question-box {
      background: rgba(255, 228, 235, 0.8);
      border-radius: 18px;
      padding: 18px;
      border: 1px solid rgba(244, 114, 182, 0.5);
      margin-bottom: 16px;
    }

    .question-number {
      font-size: 0.85rem;
      color: #be185d;
      margin-bottom: 4px;
    }

    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #831843;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      margin-top: 10px;
    }

    .option {
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 228, 235, 0.7);
      border: 1px solid rgba(244, 114, 182, 0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.18s ease;
    }

    .option:hover {
      background: rgba(244, 114, 182, 0.2);
      border-color: #ec4899;
      transform: translateY(-1px);
    }

    .option.correct {
      background: rgba(34, 197, 94, 0.25);
      border-color: #22c55e;
    }

    .option.incorrect {
      background: rgba(239, 68, 68, 0.25);
      border-color: #ef4444;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #db2777);
      color: white;
      box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: #9d174d;
      border: 1px solid #f472b6;
    }

    .btn-ghost:hover {
      background: rgba(255, 228, 235, 0.7);
    }

    .result-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 228, 235, 0.9);
      border: 1px solid rgba(244, 114, 182, 0.5);
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-top: 6px;
      font-weight: 600;
    }

    .badge-basic {
      background: #ffe4e6;
      color: #db2777;
      border: 1px solid #f9a8d4;
    }

    .badge-mid {
      background: #f0fdf4;
      color: #22c55e;
      border: 1px solid #86efac;
    }

    .badge-advanced {
      background: #eff6ff;
      color: #3b82f6;
      border: 1px solid #93c5fd;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">AUTOESCUELA MATÍAS</div>
    <div class="subtitle">Test oficial · 10 preguntas aleatorias</div>

    <div class="progress-bar">
      <div class="progress-fill" id="barra-progreso"></div>
    </div>

          <!-- Área de pregunta y opciones -->
          <div class="question-area">

            <!-- Cabecera con badges -->
            <div class="question-header">
              <span class="badge" id="question-counter">Pregunta 0 / 0</span>
              <span class="badge" id="question-topic">Tema: —</span>
            </div>

            <!-- Selector de cantidad de preguntas -->
            <div class="selector-box" id="selector-box">
              <span class="selector-label">Selecciona cuántas preguntas quieres:</span>
              <button class="selector-btn" onclick="setQuestionCount(5)">5</button>
              <button class="selector-btn" onclick="setQuestionCount(10)">10</button>
              <button class="selector-btn" onclick="setQuestionCount(20)">20</button>
              <button class="selector-btn" onclick="setQuestionCount(30)">30</button>
              <button class="selector-btn" onclick="setQuestionCount(40)">40</button>
              <button class="selector-btn" onclick="setQuestionCount(50)">50</button>
            </div>

    <div class="result-box" id="resultado">
      <div id="texto-resultado"></div>
      <div id="badge-nivel" class="badge"></div>
      <div id="texto-nivel" style="margin-top:6px;"></div>
    </div>
  </div>

  <script>
    const bancoPreguntas = [
      { texto: "¿Velocidad máxima en autopista para turismos?", opciones: ["90 km/h", "100 km/h", "120 km/h"], correcta: 2 },
      { texto: "Semáforo ámbar fijo: si puedes detenerte, ¿qué haces?", opciones: ["Acelerar", "Detenerte", "Pasar igual"], correcta: 1 },
      { texto: "En una glorieta, ¿quién tiene prioridad?", opciones: ["El que entra", "El que circula dentro", "El más grande"], correcta: 1 },
      { texto: "Línea continua en la calzada:", opciones: ["Prohibido adelantar", "Solo recomendación", "No significa nada"], correcta: 0 },
      { texto: "Si has bebido alcohol:", opciones: ["Conducir despacio", "Esperar", "No conducir"], correcta: 2 },
      { texto: "Peatón cruzando sin semáforo:", opciones: ["Claxon", "Detenerte", "Pasar antes"], correcta: 1 },
      { texto: "Niebla densa:", opciones: ["Largas", "Cortas + antiniebla", "Ninguna"], correcta: 1 },
      { texto: "Distancia de seguridad:", opciones: ["La necesaria para frenar", "5 metros", "Solo en autopista"], correcta: 0 },
      { texto: "Paso a nivel sin barreras y viene un tren:", opciones: ["Acelerar", "Detenerte", "Pasar si está lejos"], correcta: 1 },
      { texto: "Señal de STOP:", opciones: ["Reducir", "Detenerse y ceder", "Solo si viene alguien"], correcta: 1 }
    ];

    const NUM = 10;
    let preguntas = [];
    let indice = 0;
    let correctas = 0;
    let respondida = false;

    const numeroPreguntaEl = document.getElementById("numero-pregunta");
    const textoPreguntaEl = document.getElementById("texto-pregunta");
    const contenedorOpcionesEl = document.getElementById("contenedor-opciones");
    const barraProgreso = document.getElementById("barra-progreso");
    const resultadoBox = document.getElementById("resultado");
    const textoResultado = document.getElementById("texto-resultado");
    const badgeNivel = document.getElementById("badge-nivel");
    const textoNivel = document.getElementById("texto-nivel");

    function barajar(arr) {
      return arr.map(v => ({ v, o: Math.random() }))
                .sort((a, b) => a.o - b.o)
                .map(x => x.v);
    }

    function iniciar() {
      preguntas = barajar(bancoPreguntas).slice(0, NUM);
      indice = 0;
      correctas = 0;
      resultadoBox.style.display = "none";
      barraProgreso.style.width = "0%";
      cargar();
    }

    function cargar() {
      const p = preguntas[indice];
      numeroPreguntaEl.textContent = `Pregunta ${indice + 1} de ${NUM}`;
      textoPreguntaEl.textContent = p.texto;
      contenedorOpcionesEl.innerHTML = "";
      respondida = false;

      p.opciones.forEach((op, i) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `<input type="radio" name="r">${op}`;

        label.onclick = () => {
          if (respondida) return;
          respondida = true;

          const opciones = document.querySelectorAll(".option");
          opciones.forEach((l, idx) => {
            if (idx === p.correcta) l.classList.add("correct");
            if (idx === i && idx !== p.correcta) l.classList.add("incorrect");
          });

          if (i === p.correcta) correctas++;
        };

        contenedorOpcionesEl.appendChild(label);
      });

      barraProgreso.style.width = `${(indice / NUM) * 100}%`;
    }

    document.getElementById("btn-siguiente").onclick = () => {
      if (!respondida) return;

      indice++;
      if (indice < NUM) cargar();
      else finalizar();
    };

    document.getElementById("btn-reiniciar").onclick = iniciar;

    function finalizar() {
      barraProgreso.style.width = "100%";
      contenedorOpcionesEl.innerHTML = "";
      textoPreguntaEl.textContent = "Examen completado";

      resultadoBox.style.display = "block";
      textoResultado.innerHTML = `Has acertado <strong>${correctas}</strong> de <strong>${NUM}</strong>.`;

      if (correctas <= 4) {
        badgeNivel.className = "badge badge-basic";
        badgeNivel.textContent = "Nivel básico";
        textoNivel.textContent = "Necesitas repasar un poco más.";
      } else if (correctas <= 8) {
        badgeNivel.className = "badge badge-mid";
        badgeNivel.textContent = "Nivel intermedio";
        textoNivel.textContent = "Buen trabajo, vas por buen camino.";
      } else {
        badgeNivel.className = "badge badge-advanced";
        badgeNivel.textContent = "Nivel avanzado";
        textoNivel.textContent = "Excelente, estás muy preparado.";
      }
    }

    iniciar();
  </script>
</body>
</html>
