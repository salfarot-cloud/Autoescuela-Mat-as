<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Autoescuela Matías — Campus 2026. Test de conducción con temario resumido del permiso B." />
    <title>Autoescuela Matías — Campus 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>

    <!-- SIDEBAR DE NAVEGACIÓN -->
    <aside class="sidebar">
      <div class="brand">
        <h1>AUTOESCUELA MATÍAS</h1>
        <p>MÉTODO RESUMIDO 2026</p>
      </div>
      <nav class="nav-group">
        <button class="nav-btn active" id="nav-test" onclick="showPage('test', this)">📝 Realizar Test</button>
        <button class="nav-btn" id="nav-temario" onclick="showPage('temario', this)">📚 Temario Resumido</button>
      </nav>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

      <!-- PANEL TEST -->
      <section id="test" class="panel active">
        <div class="test-grid">

          <!-- Imagen de la pregunta -->
          <div class="image-container">
            <img id="main-img" src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=800" alt="Imagen relacionada con la pregunta actual" />
          </div>

          <!-- Área de pregunta y opciones -->
          <div class="question-area">

            <!-- Cabecera con badges -->
            <div class="question-header">
              <span class="badge" id="question-counter">Pregunta 0 / 0</span>
              <span class="badge" id="question-topic">Tema: —</span>
            </div>

            <!-- Selector de cantidad de preguntas -->
            <div class="selector-box" id="selector-box">
              <span class="selector-label">Selecciona cuántas preguntas quieres:</span>
              <button class="selector-btn" onclick="setQuestionCount(5)">5</button>
              <button class="selector-btn" onclick="setQuestionCount(10)">10</button>
              <button class="selector-btn" onclick="setQuestionCount(20)">20</button>
              <button class="selector-btn" onclick="setQuestionCount(30)">30</button>
              <button class="selector-btn" onclick="setQuestionCount(40)">40</button>
              <button class="selector-btn" onclick="setQuestionCount(50)">50</button>
            </div>

            <!-- Texto de la pregunta -->
            <div id="q-txt" class="question-text"></div>

            <!-- Título de opciones -->
            <div class="options-title" id="options-title" style="display:none;">Elige una respuesta:</div>

            <!-- Contenedor de opciones (generado por components.js) -->
            <div id="options-box"></div>

            <!-- Feedback / Explicación -->
            <div id="feedback"></div>

            <!-- Caja de resultados finales (generado por components.js) -->
            <div id="result-box" class="result-box" style="display:none;"></div>

            <!-- Botón siguiente -->
            <button id="next-btn" class="btn-next" style="display:none;">Siguiente pregunta →</button>

          </div>
        </div>
      </section>

      <!-- PANEL TEMARIO -->
      <section id="temario" class="panel">
        <div class="temario-header">
          <h2>Contenido del Manual 2026 (Resumido)</h2>
          <p>Basado en el manual resumido del permiso B 2026.</p>
        </div>
        <!-- Tarjetas generadas por components.js + app.js -->
        <div id="topic-grid"></div>
      </section>

    </main>

    <!-- Módulos JavaScript en orden correcto (Model → View → Controller) -->
    <script src="data.js"></script>
    <script src="components.js"></script>
    <script src="app.js"></script>

  </body>
</html>
