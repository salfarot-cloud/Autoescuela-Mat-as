<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoescuela PRO | v2.1 Fixed</title>

<style>
  :root {
    --primary: #3498db; --success: #2ecc71; --error: #e74c3c;
    --dark: #2c3e50; --light: #f8f9fa;
  }

  body {
    margin: 0; font-family: system-ui, -apple-system, sans-serif;
    background: #eef2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }

  .card {
    width: 95%; max-width: 500px; background: white; padding: 30px;
    border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center; position: relative; overflow: hidden;
  }

  .progress-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: #eee;
  }
  #progress-bar { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }

  .record-badge {
    background: #f1c40f; color: #000; padding: 4px 12px; border-radius: 20px;
    font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: inline-block;
  }

  #timer { font-size: 1.5rem; font-weight: bold; color: var(--error); margin: 15px 0; }
  
  .options-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

  button {
    padding: 15px; border: 2px solid #eee; border-radius: 12px;
    background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 500;
  }

  button:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Pantalla de inicio */
  #overlay {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: white; display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 10;
  }
</style>
</head>
<body>

<div class="card" id="app">
  <div id="overlay">
    <h1>🚗 Autoescuela PRO</h1>
    <p>15 Preguntas | 15 Segundos por respuesta</p>
    <button onclick="startApp()" style="background: var(--primary); color: white; padding: 15px 40px;">EMPEZAR TEST</button>
  </div>

  <div class="progress-container"><div id="progress-bar"></div></div>
  
  <div id="record-display" class="record-badge">Récord: 0</div>
  <div id="timer">⏱ --</div>
  <p id="pregunta" style="font-size: 1.2rem; min-height: 3em; display: flex; align-items: center; justify-content: center;"></p>

  <div class="options-grid">
    <button id="b0" onclick="answer(0)"></button>
    <button id="b1" onclick="answer(1)"></button>
    <button id="b2" onclick="answer(2)"></button>
  </div>
</div>

<script>
// Sonidos con fallback por si fallan las URLs
const sndOk = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
const sndFail = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

const base = [
  { q:"¿Qué significa STOP?", o:["Ceder el paso","Parar obligatoriamente","Girar derecha"], c:1 },
  { q:"Semáforo amarillo fijo", o:["Acelerar","Parar si es seguro","Pasar siempre"], c:1 },
  { q:"Móvil conduciendo", o:["Permitido","Solo manos libres","Prohibido siempre"], c:1 },
  { q:"Velocidad en ciudad (1 carril)", o:["20 km/h","30 km/h","50 km/h"], c:1 },
  { q:"Prioridad en rotonda", o:["El que entra","El que está dentro","Vehículos pesados"], c:1 },
  { q:"Alcohol conductor novel", o:["0.15 mg/l","0.30 mg/l","0.50 mg/l"], c:0 },
  { q:"Línea continua", o:["Permitido adelantar","No pisar ni cruzar","Solo motos"], c:1 },
  { q:"Distancia de seguridad", o:["1 metro","La que permita frenar","10 metros"], c:1 },
  { q:"¿Obligatorio el cinturón?", o:["Solo en ciudad","Solo en carretera","En todas las vías"], c:2 },
  { q:"Luz de niebla trasera", o:["Siempre que llueva","Niebla densa solamente","Opcional"], c:1 },
  { q:"Peatón en paso sin semáforo", o:["Tiene prioridad","Debe esperar","Coches primero"], c:0 },
  { q:"Chaleco reflectante", o:["Dentro del maletero","Al alcance (habitáculo)","No es obligatorio"], c:1 },
  { q:"Triángulos/Luz V16", o:["A 10 metros","A 50 metros","No hace falta"], c:1 },
  { q:"Sentido obligatorio", o:["Flecha azul redonda","Cuadrado azul","Señal STOP"], c:0 },
  { q:"Documentación original", o:["No hace falta","Obligatoria llevarla","Sirve una foto"], c:1 }
];

let preguntas = [], i = 0, puntos = 0, timer, tiempo = 15;

function startApp() {
  document.getElementById("overlay").style.display = "none";
  // Desbloqueamos audio para navegadores
  sndOk.play().then(() => sndOk.pause()); 
  init();
}

function init() {
  const record = localStorage.getItem('driving_record') || 0;
  document.getElementById("record-display").textContent = `Récord: ${record}/${base.length}`;
  preguntas = [...base].sort(() => Math.random() - 0.5);
  i = 0; puntos = 0;
  render();
}

function render() {
  if (i >= preguntas.length) return end();
  
  clearInterval(timer);
  const p = preguntas[i];
  
  document.getElementById("progress-bar").style.width = `${(i / preguntas.length) * 100}%`;
  document.getElementById("pregunta").textContent = p.q;
  
  p.o.forEach((op, idx) => {
    const btn = document.getElementById("b"+idx);
    btn.textContent = op;
    btn.disabled = false;
    btn.style.background = "white";
    btn.style.borderColor = "#eee";
  });

  startTimer();
}

function startTimer() {
  tiempo = 15;
  document.getElementById("timer").textContent = `⏱ ${tiempo}s`;
  timer = setInterval(() => {
    tiempo--;
    document.getElementById("timer").textContent = `⏱ ${tiempo}s`;
    if (tiempo <= 0) answer(-1);
  }, 1000);
}

function answer(op) {
  clearInterval(timer);
  const p = preguntas[i];
  const win = (op === p.c);
  
  if (win) {
    puntos++;
    sndOk.play().catch(()=>{});
    document.getElementById("b"+op).style.background = "#d4edda";
  } else {
    sndFail.play().catch(()=>{});
    if(op !== -1) document.getElementById("b"+op).style.background = "#f8d7da";
  }

  [0,1,2].forEach(n => document.getElementById("b"+n).disabled = true);

  setTimeout(() => { i++; render(); }, 1000);
}

function end() {
  const recordActual = localStorage.getItem('driving_record') || 0;
  if (puntos > recordActual) localStorage.setItem('driving_record', puntos);

  document.getElementById("app").innerHTML = `
    <div style="padding: 20px;">
      <h1>🏁 Resultados</h1>
      <h2 style="font-size: 3.5rem; margin: 10px 0; color: var(--primary);">${puntos}/${preguntas.length}</h2>
      <p style="font-weight: bold; color: ${puntos >= 13 ? 'var(--success)' : 'var(--error)'}">
        ${puntos >= 13 ? '🏆 ¡APROBADO!' : '🚗 Necesitas practicar más'}
      </p>
      <button onclick="location.reload()" style="background: var(--dark); color: white; width: 100%; margin-top: 20px;">Reintentar</button>
    </div>
  `;
}
</script>
</body>
</html>
