<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoescuela Matías — Test</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="card">
      <div class="title">AUTOESCUELA MATÍAS</div>
      <div class="subtitle">Test oficial · 10 preguntas aleatorias</div>

      <div class="progress-bar">
        <div class="progress-fill" id="barra-progreso"></div>
      </div>

      <div class="question-box">
        <div class="question-number" id="numero-pregunta">Pregunta 1 de 10</div>
        <img id="imagen-pregunta" class="question-image" alt="Imagen de la pregunta" />
        <div class="question-text" id="texto-pregunta">Cargando...</div>
      </div>

      <div class="options" id="contenedor-opciones"></div>

      <div class="buttons-container">
        <button class="btn btn-ghost" id="btn-reiniciar">Reiniciar</button>
        <button class="btn btn-primary" id="btn-siguiente">Siguiente →</button>
      </div>

      <div class="result-box" id="resultado">
        <div id="texto-resultado"></div>
        <div id="badge-nivel" class="badge"></div>
        <div id="texto-nivel" style="margin-top: 6px;"></div>
      </div>
    </div>

    <!-- Módulos JavaScript -->
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
